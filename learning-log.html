<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Weekly WebStudy Log</title>
    <link rel="stylesheet" href="style.css" />
  </head>
    <body class="learning-log-page">
      <main class="card">
        <header>
          <h1>Weekly WebStudy Log</h1>
          <p>Web学習をまとめるページです。</p>
          <a class="buttonlink log-link" href="index.html">自己紹介ページに戻る</a>

          <div class="log-controls">
            <button class="action-button action-button-green" id="toggle-all-button">すべての記録を開く</button>
          </div>
          
          <section class="log-form-section">
            <h2 class="section-title">記録を追加</h2>
            <div class="section-box">
              <div class="log-form">
                <div class="form-row">
                  <label class="form-field">
                    <span>日付</span>
                    <input type="date" id="log-date">
                  </label>
                  
                  <label class="form-field form-field-done">
                    <span>今週やったこと</span>
                    <textarea id="log-done"></textarea>
                  </label>
                </div>

                <div class="form-row">
                  <label class="form-field form-field-memo">
                    <span>メモ</span>
                    <textarea id="log-memo"></textarea>
                  </label>

                  <button class="action-button add-log-button" id="add-log-button">記録を追加</button>
                </div>              
              </div>
            </div>
          </section>

          <section class="log-index">
            <h2 class="section-title">目次</h2>
            <div>
              <ul id="logIndexList">
              </ul>
            </div>
          </section>
        </header>
      </main>
      <script src="logs-data.js"></script>
      <script src="learning-log.js"></script>
    </body>
</html>
