<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Weekly WebStudy Log</title>
    <link rel="stylesheet" href="style.css" />
  </head>
    <body class="learning-log-page">
      <main class="card">
        <header>
          <h1>Weekly WebStudy Log</h1>
          <p>Web学習をまとめるページです。</p>
          <a class="buttonlink log-link" href="index.html">自己紹介ページに戻る</a>

          <div class="log-controls">
            <button class="action-button action-button-green" id="toggle-all-button">すべての記録を開く</button>
          </div>

          <section class="log-index">
            <h2 class="section-title">目次</h2>
            <div>
              <ul>
                <li><a class="log-index-link" id="index-link-2026-04-06" href="#logSection20260406">2026-04-06の学習記録</a></li>
                <li><a class="log-index-link" id="index-link-2026-04-13" href="#logSection20260413">2026-04-13の学習記録</a></li>
                <li><a class="log-index-link" id="index-link-2026-04-20" href="#logSection20260420">2026-04-20の学習記録</a></li>
              </ul>
            </div>
          </section>
        </header>
        
        <!--1週目の記録-->
        <section class="log-entry" id="logSection20260406">
          <div class="log-header">
            <h2 class="section-title" id="firstWeeklyLogDate">2026-04-06</h2>
            <button class="action-button log-toggle-button" id="toggle-log-2026-04-06">開く</button>
          </div>
          
          <div class="log-content hidden" id="logContent20260406">
            <h3>今週やったこと</h3>
            <div class="section-box">
              <ul id="firstweeklyLogDone">                
              </ul>
            </div>  
              
            <h3>学んだこと</h3>
            <div class="section-box">
              <ul id="firstWeeklyLogLearned">
              </ul>
            </div>

            <h3>次にやること</h3>
            <div class="section-box">
              <ul id="firstWeeklyLogNext">                
              </ul>  
            </div>

            <h3>メモ</h3>
            <div class="section-box">
              <p id="firstWeeklyLogMemo"></p>
            </div> 
          </div>
        </section>
        
        <!--2週目の記録-->
        <section class="log-entry" id="logSection20260413">
          <div class="log-header">
            <h2 class="section-title" id="secondWeeklyLogDate">2026-04-13</h2>
            <button class="action-button log-toggle-button" id="toggle-log-2026-04-13">開く</button>
          </div>

          <div class="log-content hidden" id="logContent20260413">
          <h3>今週やったこと</h3>
          <div class="section-box">
            <ul id="secondweeklyLogDone">
            </ul>
          </div>  
            
          <h3>学んだこと</h3>
          <div class="section-box">
            <ul id="secondWeeklyLogLearned">
            </ul>
          </div>

          <h3>次にやること</h3>
          <div class="section-box">
            <ul id="secondWeeklyLogNext">
            </ul>  
          </div>

          <h3>メモ</h3>
          <div class="section-box">
            <p id="secondWeeklyLogMemo"></p>
          </div>  
         </div>
        </section>
 
        <!--3週目の記録-->
        <section class="log-entry" id="logSection20260420">
          <div class="log-header">
            <h2 class="section-title" id="thirdWeeklyLogDate">2026-04-20</h2>
            <button class="action-button log-toggle-button" id="toggle-log-2026-04-20">開く</button>
          </div>

          <div class="log-content hidden" id="logContent20260420">
          <h3>今週やったこと</h3>
          <div class="section-box">
            <ul id="thirdweeklyLogDone">
            </ul>
          </div>  
            
          <h3>学んだこと</h3>
          <div class="section-box">
            <ul id="thirdWeeklyLogLearned">
            </ul>
          </div>

          <h3>次にやること</h3>
          <div class="section-box">
            <ul id="thirdWeeklyLogNext">
            </ul>  
          </div>

          <h3>メモ</h3>
          <div class="section-box">
            <p id="thirdWeeklyLogMemo"></p>
          </div>  
         </div>
        </section>        
      </main>
      <script src="learning-log.js"></script>
    </body>
</html>
